
services:
  azbrain-web:
    build: ./frontend
    container_name: azbrain-web
    ports:
      - "${AZBRAIN_WEB_PORT:-8082}:80"
    depends_on:
      - azbrain-api
    restart: unless-stopped

  azbrain-api:
    build: ./backend
    container_name: azbrain-api
    ports:
      - "${AZBRAIN_API_PORT:-8081}:8080"
    environment:
      - PORT=8080
      - PGHOST=${PGHOST:-192.168.0.21}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-postgres}
      - PGUSER=${PGUSER:-azbrain}
      - PGPASSWORD=${PGPASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-dev-only-change-me}
    restart: unless-stopped

  ecams-ai:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1008}
        APP_GID: ${APP_GID:-1015}
    container_name: ecams-ai-linux
    ports:
      - "${ECAMS_HTTP_PORT:-3000}:3000"
    volumes:
      - ./workspace:/app/workspace
      - ./backup:/app/backup
      - ./logs:/app/logs
      - ./wiki:/app/wiki
      - ./indexes:/app/indexes
      # AGY 계정 인증 정보(월정액 세션)가 저장된 로컬 설정 폴더를 컨테이너 내부로 연동
      - ~/.gemini:/home/node/.gemini
    environment:
      - PORT=3000
      - WORKSPACE_DIR=/app/workspace
      - BACKUP_DIR=/app/backup
      - PGHOST=${PGHOST:-192.168.0.21}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-postgres}
      - PGUSER=${PGUSER:-azbrain}
      - PGPASSWORD=${PGPASSWORD:-}
    restart: unless-stopped

  pms-bridge:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1008}
        APP_GID: ${APP_GID:-1015}
    container_name: pms-bridge
    command: ["node", "pmsBridge.js"]
    ports:
      - "${PMS_BRIDGE_PORT:-8790}:8790"
    volumes:
      # AGY 월정액 세션 인증(API 키 쿼터 초과 시 폴백). ecams-ai 와 동일 마운트.
      - ~/.gemini:/home/node/.gemini
    environment:
      - PMS_BRIDGE_PORT=8790
      - PMS_BRIDGE_TOKEN=${PMS_BRIDGE_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # ?20.3 pgvector ??? ???. azbrain ?? DB ??? pms-bridge?? ????.
      - PGHOST=${PGHOST:-192.168.0.21}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-postgres}
      - PGUSER=${PGUSER:-azbrain}
      - PGPASSWORD=${PGPASSWORD:-}
      - PMS_EMBED_BATCH_SIZE=${PMS_EMBED_BATCH_SIZE:-20}
      - PMS_EMBED_MAX_RETRIES=${PMS_EMBED_MAX_RETRIES:-3}
      - PMS_EMBED_RETRY_MAX_DELAY_MS=${PMS_EMBED_RETRY_MAX_DELAY_MS:-30000}
      - PMS_EMBED_RETRY_BUDGET_MS=${PMS_EMBED_RETRY_BUDGET_MS:-60000}
      # 분류 백엔드: hybrid(기본, API→agy 폴백) | api | agy
      - PMS_CLASSIFY_BACKEND=${PMS_CLASSIFY_BACKEND:-hybrid}
    restart: unless-stopped
