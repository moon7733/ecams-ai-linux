
services:
  ecams-ai:
    build: .
    container_name: ecams-ai-linux
    ports:
      - "${ECAMS_HTTP_PORT:-3000}:3000"
    volumes:
      - ./workspace:/app/workspace
      - ./backup:/app/backup
      - ./logs:/app/logs
      - ./wiki:/app/wiki
      - ./indexes:/app/indexes
      # AGY 계정 인증 정보(월정액 세션)가 저장된 로컬 설정 폴더를 컨테이너 내부로 연동
      - ~/.gemini:/root/.gemini
    environment:
      - PORT=3000
      - WORKSPACE_DIR=/app/workspace
      - BACKUP_DIR=/app/backup
      - PGHOST=${PGHOST:-192.168.0.21}
      - PGPORT=${PGPORT:-5432}
      - PGDATABASE=${PGDATABASE:-azbrain}
      - PGUSER=${PGUSER:-azbrain}
      - PGPASSWORD=${PGPASSWORD:-}
    restart: unless-stopped
